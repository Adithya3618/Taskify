<div class="page">
  <button class="themeToggle" type="button" (click)="themeService.toggle()"
          [attr.aria-label]="themeService.isDark ? 'Switch to light mode' : 'Switch to dark mode'">
    <svg *ngIf="themeService.isDark" class="themeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
      <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <svg *ngIf="!themeService.isDark" class="themeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <div class="card">
    <a routerLink="/" class="backLink">← Back to home</a>
    <div class="logo">
      <svg class="logoSvgFull" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lgS" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#22D3EE"/>
            <stop offset="55%"  stop-color="#818CF8"/>
            <stop offset="100%" stop-color="#E879F9"/>
          </linearGradient>
          <clipPath id="tcS">
            <path d="M10 8 H90 V30 H60 V92 H40 V30 H10 Z"/>
          </clipPath>
        </defs>
        <g class="ptGroup">
          <circle class="pt pt1"  cx="-6"  cy="10"  r="4"   fill="#22D3EE"/>
          <circle class="pt pt2"  cx="106" cy="14"  r="3"   fill="#818CF8"/>
          <circle class="pt pt3"  cx="104" cy="65"  r="3.5" fill="#E879F9"/>
          <circle class="pt pt4"  cx="-4"  cy="80"  r="3"   fill="#22D3EE"/>
          <circle class="pt pt5"  cx="50"  cy="-9"  r="2.5" fill="#818CF8"/>
          <circle class="pt pt6"  cx="92"  cy="104" r="3"   fill="#E879F9"/>
          <line   class="pt pt7"  x1="96"  y1="26" x2="110" y2="36" stroke="#22D3EE" stroke-width="3.5" stroke-linecap="round"/>
          <line   class="pt pt8"  x1="-10" y1="40" x2="2"   y2="52" stroke="#818CF8" stroke-width="3"   stroke-linecap="round"/>
          <circle class="pt pt9"  cx="18"  cy="110" r="2.5" fill="#818CF8"/>
          <line   class="pt pt10" x1="76"  y1="108" x2="90" y2="120" stroke="#E879F9" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <g class="logoGroup">
          <path d="M10 8 H90 V30 H60 V92 H40 V30 H10 Z" fill="url(#lgS)"/>
          <line x1="14" y1="5"  x2="34" y2="96" stroke="rgba(255,255,255,0.18)" stroke-width="14" clip-path="url(#tcS)"/>
          <line x1="48" y1="5"  x2="64" y2="33" stroke="rgba(255,255,255,0.25)" stroke-width="10" clip-path="url(#tcS)"/>
          <path class="checkPath" d="M30 60 L46 78 L86 18" stroke="rgba(255,255,255,0.92)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>
      </svg>
    </div>
    <h1>Create your account</h1>
    <p class="subtitle">Sign up to get started with Taskify.</p>

    <form (ngSubmit)="onSubmit()" class="form">
      <label class="field">
        <span>Name</span>
        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          placeholder="Your name"
          autocomplete="name"
        />
      </label>
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </label>
      <label class="field">
        <span>Password</span>
        <div class="passwordWrap">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <button type="button" class="eyeBtn" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <svg *ngIf="!showPassword" class="eyeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M1.5 12s3.8-7 10.5-7 10.5 7 10.5 7-3.8 7-10.5 7S1.5 12 1.5 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <svg *ngIf="showPassword" class="eyeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6.7 6.8C4 8.6 2.4 11 2.4 11s3.4 6.6 9.6 6.6c2.1 0 4-.5 5.5-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14.7 6.6c4.1.8 6.9 4.4 6.9 4.4s-.8 1.6-2.4 3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </label>
      <label class="field">
        <span>Confirm password</span>
        <div class="passwordWrap">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <button type="button" class="eyeBtn" (click)="showConfirmPassword = !showConfirmPassword" [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'">
            <svg *ngIf="!showConfirmPassword" class="eyeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M1.5 12s3.8-7 10.5-7 10.5 7 10.5 7-3.8 7-10.5 7S1.5 12 1.5 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <svg *ngIf="showConfirmPassword" class="eyeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6.7 6.8C4 8.6 2.4 11 2.4 11s3.4 6.6 9.6 6.6c2.1 0 4-.5 5.5-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14.7 6.6c4.1.8 6.9 4.4 6.9 4.4s-.8 1.6-2.4 3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </label>
      <p *ngIf="error" class="error">{{ error }}</p>
      <button type="submit" class="btn primary" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Sign up' }}
      </button>
    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <button type="button" class="btn googleBtn" (click)="signInWithGoogle()" [disabled]="googleLoading">
      <svg *ngIf="!googleLoading" class="googleIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span class="googleSpinner" *ngIf="googleLoading"></span>
      {{ googleLoading ? 'Redirecting...' : 'Sign up with Google' }}
    </button>
    <p *ngIf="googleError" class="error googleError">{{ googleError }}</p>

    <p class="footerText">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
