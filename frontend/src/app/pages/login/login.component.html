<div class="page">
  <div class="card">
    <a routerLink="/" class="backLink">← Back to home</a>
    <div class="logo">T</div>
    <h1>Log in to Taskify</h1>
    <p class="subtitle">Enter your credentials to continue.</p>

    <form (ngSubmit)="onSubmit()" class="form">
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </label>
      <label class="field">
        <span>Password</span>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </label>
      <button type="button" class="forgotLink" (click)="openForgotPassword()">
        Forgot password? Change password
      </button>
      <p *ngIf="error" class="error">{{ error }}</p>
      <button type="submit" class="btn primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Log in' }}
      </button>
    </form>

    <p class="footerText">
      Don't have an account?
      <a routerLink="/signup">Sign up</a>
    </p>
  </div>

  <div *ngIf="showForgotModal" class="modalBackdrop" (click)="closeForgotPassword()">
    <div class="modalCard" (click)="$event.stopPropagation()">
      <div class="modalHead">
        <h3>{{ forgotTitle }}</h3>
        <button type="button" class="closeBtn" (click)="closeForgotPassword()">×</button>
      </div>
      <p class="modalSubtitle">{{ forgotSubtitle }}</p>

      <ng-container *ngIf="forgotStep !== 'success'">
        <label class="field">
          <span>Email</span>
          <input
            type="email"
            [(ngModel)]="forgotEmail"
            [disabled]="forgotLoading || forgotStep === 'reset'"
            placeholder="you@example.com"
          />
        </label>

        <div *ngIf="forgotStep === 'request' || forgotStep === 'verify'" class="codeRow">
          <button
            type="button"
            class="btn ghost codeBtn"
            [disabled]="forgotLoading || codeCooldown > 0"
            (click)="sendOrResendCode()"
          >
            {{ forgotLoading && !hasSentCode ? 'Sending...' : codeButtonLabel }}
          </button>
        </div>

        <label *ngIf="forgotStep === 'verify'" class="field">
          <span>Verification code</span>
          <input
            type="text"
            [(ngModel)]="forgotCode"
            maxlength="6"
            placeholder="Enter verification code"
          />
        </label>

        <ng-container *ngIf="forgotStep === 'reset'">
          <label class="field">
            <span>New password</span>
            <input
              type="password"
              [(ngModel)]="forgotNewPassword"
              autocomplete="new-password"
              placeholder="At least 8 characters"
            />
          </label>
          <label class="field">
            <span>Confirm password</span>
            <input
              type="password"
              [(ngModel)]="forgotConfirmPassword"
              autocomplete="new-password"
              placeholder="Re-enter password"
            />
          </label>
        </ng-container>
      </ng-container>

      <p *ngIf="forgotError" class="error">{{ forgotError }}</p>
      <p *ngIf="forgotInfo" class="status">{{ forgotInfo }}</p>

      <div class="modalActions">
        <button
          *ngIf="forgotStep === 'verify'"
          type="button"
          class="btn ghost"
          (click)="backToRequestStep()"
          [disabled]="forgotLoading"
        >
          Change email
        </button>
        <button type="button" class="btn ghost" (click)="closeForgotPassword()" [disabled]="forgotLoading">
          {{ forgotStep === 'success' ? 'Close' : 'Cancel' }}
        </button>
        <button type="button" class="btn primary" [disabled]="forgotLoading" (click)="submitForgotPassword()">
          {{ forgotContinueLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
