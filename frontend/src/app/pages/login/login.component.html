<div class="page">
  <div class="card">
    <a routerLink="/" class="backLink">← Back to home</a>
    <div class="logo">
      <svg class="logoSvgFull" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lgL" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#22D3EE"/>
            <stop offset="55%"  stop-color="#818CF8"/>
            <stop offset="100%" stop-color="#E879F9"/>
          </linearGradient>
          <clipPath id="tcL">
            <path d="M10 8 H90 V30 H60 V92 H40 V30 H10 Z"/>
          </clipPath>
        </defs>
        <g class="ptGroup">
          <circle class="pt pt1"  cx="-6"  cy="10"  r="4"   fill="#22D3EE"/>
          <circle class="pt pt2"  cx="106" cy="14"  r="3"   fill="#818CF8"/>
          <circle class="pt pt3"  cx="104" cy="65"  r="3.5" fill="#E879F9"/>
          <circle class="pt pt4"  cx="-4"  cy="80"  r="3"   fill="#22D3EE"/>
          <circle class="pt pt5"  cx="50"  cy="-9"  r="2.5" fill="#818CF8"/>
          <circle class="pt pt6"  cx="92"  cy="104" r="3"   fill="#E879F9"/>
          <line   class="pt pt7"  x1="96"  y1="26" x2="110" y2="36" stroke="#22D3EE" stroke-width="3.5" stroke-linecap="round"/>
          <line   class="pt pt8"  x1="-10" y1="40" x2="2"   y2="52" stroke="#818CF8" stroke-width="3"   stroke-linecap="round"/>
          <circle class="pt pt9"  cx="18"  cy="110" r="2.5" fill="#818CF8"/>
          <line   class="pt pt10" x1="76"  y1="108" x2="90" y2="120" stroke="#E879F9" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <g class="logoGroup">
          <path d="M10 8 H90 V30 H60 V92 H40 V30 H10 Z" fill="url(#lgL)"/>
          <line x1="14" y1="5"  x2="34" y2="96" stroke="rgba(255,255,255,0.18)" stroke-width="14" clip-path="url(#tcL)"/>
          <line x1="48" y1="5"  x2="64" y2="33" stroke="rgba(255,255,255,0.25)" stroke-width="10" clip-path="url(#tcL)"/>
          <path class="checkPath" d="M30 60 L46 78 L86 18" stroke="rgba(255,255,255,0.92)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>
      </svg>
    </div>
    <h1>Log in to Taskify</h1>
    <p class="subtitle">Enter your credentials to continue.</p>

    <form (ngSubmit)="onSubmit()" class="form">
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </label>
      <label class="field">
        <span>Password</span>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </label>
      <button type="button" class="forgotLink" (click)="openForgotPassword()">
        Forgot password? Change password
      </button>
      <p *ngIf="error" class="error">{{ error }}</p>
      <button type="submit" class="btn primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Log in' }}
      </button>
    </form>

    <p class="footerText">
      Don't have an account?
      <a routerLink="/signup">Sign up</a>
    </p>
  </div>

  <div *ngIf="showForgotModal" class="modalBackdrop" (click)="closeForgotPassword()">
    <div class="modalCard" (click)="$event.stopPropagation()">
      <div class="modalHead">
        <h3>{{ forgotTitle }}</h3>
        <button type="button" class="closeBtn" (click)="closeForgotPassword()">×</button>
      </div>
      <p class="modalSubtitle">{{ forgotSubtitle }}</p>

      <ng-container *ngIf="forgotStep !== 'success'">
        <label class="field">
          <span>Email</span>
          <input
            type="email"
            [(ngModel)]="forgotEmail"
            [disabled]="forgotLoading || forgotStep === 'reset'"
            placeholder="you@example.com"
          />
        </label>

        <div *ngIf="forgotStep === 'request' || forgotStep === 'verify'" class="codeRow">
          <button
            type="button"
            class="btn ghost codeBtn"
            [disabled]="forgotLoading || codeCooldown > 0"
            (click)="sendOrResendCode()"
          >
            {{ forgotLoading && !hasSentCode ? 'Sending...' : codeButtonLabel }}
          </button>
        </div>

        <label *ngIf="forgotStep === 'verify'" class="field">
          <span>Verification code</span>
          <input
            type="text"
            [(ngModel)]="forgotCode"
            maxlength="6"
            placeholder="Enter verification code"
          />
        </label>

        <ng-container *ngIf="forgotStep === 'reset'">
          <label class="field">
            <span>New password</span>
            <input
              type="password"
              [(ngModel)]="forgotNewPassword"
              autocomplete="new-password"
              placeholder="At least 8 characters"
            />
          </label>
          <label class="field">
            <span>Confirm password</span>
            <input
              type="password"
              [(ngModel)]="forgotConfirmPassword"
              autocomplete="new-password"
              placeholder="Re-enter password"
            />
          </label>
        </ng-container>
      </ng-container>

      <p *ngIf="forgotError" class="error">{{ forgotError }}</p>
      <p *ngIf="forgotInfo" class="status">{{ forgotInfo }}</p>

      <div class="modalActions">
        <button
          *ngIf="forgotStep === 'verify'"
          type="button"
          class="btn ghost"
          (click)="backToRequestStep()"
          [disabled]="forgotLoading"
        >
          Change email
        </button>
        <button type="button" class="btn ghost" (click)="closeForgotPassword()" [disabled]="forgotLoading">
          {{ forgotStep === 'success' ? 'Close' : 'Cancel' }}
        </button>
        <button type="button" class="btn primary" [disabled]="forgotLoading" (click)="submitForgotPassword()">
          {{ forgotContinueLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
