<div class="page">
  <div class="card">
    <a routerLink="/" class="backLink">← Back to home</a>
    <div class="logo">T</div>
    <h1>Log in to Taskify</h1>
    <p class="subtitle">Enter your credentials to continue.</p>

    <form (ngSubmit)="onSubmit()" class="form">
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </label>
      <label class="field">
        <span>Password</span>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </label>
      <button type="button" class="forgotLink" (click)="openForgotPassword()">
        Forgot password? Change password
      </button>
      <p *ngIf="error" class="error">{{ error }}</p>
      <button type="submit" class="btn primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Log in' }}
      </button>
    </form>

    <p class="footerText">
      Don't have an account?
      <a routerLink="/signup">Sign up</a>
    </p>
  </div>

  <div *ngIf="showForgotModal" class="modalBackdrop" (click)="closeForgotPassword()">
    <div class="modalCard" (click)="$event.stopPropagation()">
      <div class="modalHead">
        <h3>Forgot password</h3>
        <button type="button" class="closeBtn" (click)="closeForgotPassword()">×</button>
      </div>
      <p class="modalSubtitle">Enter the email used to register and the code you received.</p>

      <label class="field">
        <span>Email</span>
        <input type="email" [(ngModel)]="forgotEmail" placeholder="you@example.com" />
      </label>
      <div class="codeRow">
        <button
          type="button"
          class="btn ghost codeBtn"
          [disabled]="codeCooldown > 0"
          (click)="sendOrResendCode()"
        >
          {{ codeButtonLabel }}
        </button>
      </div>

      <label class="field">
        <span>Code</span>
        <input type="text" [(ngModel)]="forgotCode" placeholder="Enter verification code" />
      </label>

      <div class="modalActions">
        <button type="button" class="btn ghost" (click)="closeForgotPassword()">Cancel</button>
        <button type="button" class="btn primary" (click)="submitForgotPassword()">Continue</button>
      </div>
    </div>
  </div>
</div>
